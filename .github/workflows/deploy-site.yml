name: Deploy landing site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "shared/tokens.css"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble publish tree
        run: |
          set -euo pipefail
          mkdir -p _site
          # Copy the site itself to the publish root.
          cp -r site/. _site/
          # Replace the dev shim with the canonical tokens.
          # In dev, site/tokens.css @imports ../shared/tokens.css. The
          # published site is flat, so we inline the real tokens here.
          cp shared/tokens.css _site/tokens.css
          # Sanity check.
          test -f _site/index.html
          test -f _site/privacy.html
          test -f _site/tokens.css
          test -f _site/sitemap.xml
          test -f _site/robots.txt
          test -f _site/assets/img/hero-light.png
          test -f _site/assets/img/hero-light-1920.webp
          test -f _site/assets/img/og-card.png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
